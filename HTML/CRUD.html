<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de motocicletas - Admin</title>
    <script src="../JavaScript/CRUD.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            margin: 0;
            padding-top: 120px; /* Increased separation from navbar */
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #0004ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            box-shadow: 0px 2px 5px rgb(0, 0, 0);
            z-index: 1000;
        }

        .admin {
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px; 
            display: flex;
            color: #0004ff;
            font-weight: bold;
            font-size: 24px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: color 0.80s ease;
        }

        .nav-links a:hover {
            color: #1d1c1c;
            box-shadow: 0px 2px 5px rgb(24, 23, 23);
        }

        .btn-regresar {
            background-color: #b9ffff;
            padding: 10px 40px;
            border-radius: 40px;
            font-weight: normal;
        }

        .btn-grafica {
            background-color: #b9ffff;
            padding: 10px 30px;
            border-radius: 40px;
        }

        /* Center and separate CRUD card */
        .crud-container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 2rem; /* Extra separation */
        }
    </style>
    <!-- Scripts -->
    <script src="../JavaScript/SaveData.js"></script>
    <script src="script.js"></script>
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#" class="admin">ADMIN</a>
        <div class="nav-links">
            <a href="Principal.html" class="btn-regresar">REGRESAR</a>
            <a href="Register.html" class="btn-grafica">GRAFICA</a>
        </div>
    </nav>

    <!-- MAIN CRUD CONTENT - CENTERED & SEPARATED -->
    <div class="container-fluid mt-5 pt-5 crud-container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="card shadow mx-auto" style="max-width: 1000px;">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">CRUD de motocicletas</h4>
                    </div>

                    <div class="card-body">
                        <input type="hidden" id="indice">

                        <!-- FORM INPUTS -->
                        <div class="row mb-3 g-3">
                            <div class="col-md-6">
                                <label class="form-label">Precio</label>
                                <input type="text" id="precio" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cantidad</label>
                                <input type="number" id="cantidad" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Placa</label>
                                <input type="number" id="placa" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Marca</label>
                                <input type="text" id="marca" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Modelo</label>
                                <input type="text" id="modelo" class="form-control">
                            </div>
                        </div>

                        <!-- BUTTONS - CENTERED -->
                        <div class="mb-3 text-center">
                            <button class="btn btn-success me-2" onclick="guardar()">Guardar</button>
                            <button class="btn btn-warning" onclick="actualizar()">Actualizar</button>
                        </div>

                        <hr>

                        <!-- TABLE BELOW FORM -->
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover mx-auto">
                                <thead class="table-dark">
                                    <tr>
                                        <th width="200">Nombre</th>
                                        <th width="200">Precio</th>
                                        <th width="200">Cantidad</th>
                                        <th width="200">Placa</th>
                                        <th width="200">Marca</th>
                                        <th width="200">Modelo</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
