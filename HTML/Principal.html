<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina principal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            margin: 0;
            /* Leave space for the fixed navbar so page content doesn't sit underneath it */
            padding-top: 80px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #0004ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            box-shadow: 0px 2px 5px rgb(0, 0, 0);
        }

        .logo {
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px; 
            display: flex;
            color: #0004ff;
            font-weight: bold;
            font-size: 24px;
            text-decoration: none;

        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: color 0.80s ease;
        }

        .nav-links a:hover {
            color: #1d1c1c;
            box-shadow: 0px 2px 5px rgb(24, 23, 23);
        }

        .btn-login {
            background-color: #b9ffff;
            padding: 10px 40px;
            border-radius: 40px;
            font-weight: normal;
        }

        .btn-register {
            background-color: #b9ffff;
            padding: 10px 30px;
            border-radius: 40px;
        }


    </style>
</head>

<body>

    <a href="login.html" class="login-btn-fixed">ADMIN Login</a>

    <section class="hero">
        <h1>Sistema de Motocicletas</h1>
        <p>Bienvenido a la plataforma de gestión completa de motocicletas. Inicia sesión o regístrate para acceder al CRUD y todas las funcionalidades administrativas.</p>
        <div class="hero-buttons">
            <a href="login.html" class="btn-hero btn-login-hero">Iniciar Sesión</a>
            <a href="Register.html" class="btn-hero btn-register-hero">Crear Cuenta</a>
        </div>
    </section>

    </nav>
</body>
