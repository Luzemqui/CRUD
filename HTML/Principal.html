<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina principal</title>
<link rel="stylesheet" href="CSS/Style.css">

    <script defer src="JavaScript/SaveData.js"></script>
</head>

<body>

    <nav class="navbar">
        <a href="#" class="logo">Logo</a>
        <div class="nav-links">
             <a href="login.html" class="btn-login">login</a>
            <a href="Register.html" class="btn-register">registro</a>
        </div>

    </nav>
    <div class="container">
        <h1>Gestión de Personas/Vehículos</h1>
        
        <!-- CRUD Form -->
        <form id="crudForm" style="max-width: 600px; margin-bottom: 30px;">
            <input type="hidden" id="indice">
            
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" required>
            </div>
            
            <div class="form-group">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" required>
            </div>
            
            <div class="form-group">
                <label for="placa">Placa:</label>
                <input type="text" id="placa" required>
            </div>
            
            <div class="form-group">
                <label for="marca">Marca:</label>
                <input type="text" id="marca">
            </div>
            
            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" id="modelo">
            </div>
            
            <button type="button" class="btn" onclick="guardar()">Guardar</button>
            <button type="button" class="btn" onclick="actualizar()">Actualizar</button>
            <button type="button" class="btn" onclick="limpiar()">Limpiar</button>
        </form>
        
        <!-- Data Table -->
        <table id="tabla">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Edad</th>
                    <th>Placa</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</body>
