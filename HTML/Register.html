<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="../JavaScript/SaveData.js"></script>
        <title>Register</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }

            body {
                background-color: #ffffff;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .login-container {
                background-color: #666565;
                padding: 250px 20px;
                border-radius: 10px;
                box-shadow: 0px 2px 5px rgb(0, 0, 0);
            }

            .login-container h2 {
                text-align: center;
                margin-bottom: 20px;
            }

.login-container input[type="text"],
            .login-container input[type="password"],
            .login-container input[name="confirmPassword"] {
                width: 100%;
                padding: 10px;
                margin-bottom: 20px;
                border-radius: 5px;
                border: 1px solid #ccc;
            }

.login-container input[type="password"],
            .login-container input[id="confirmPassword"] {
                width: 100%;
                padding: 10px;
                margin-bottom: 20px;
                border-radius: 5px;
                border: 1px solid #ccc;
            }

            .btn-register {
                display: block;
                margin:  auto;
                background-color: #0004ff;
                color: #ffffff;
                padding: 10px 19px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            .btn-register:hover {
                box-shadow: 0px 2px 5px rgb(0, 0, 0);
            }

            .btn-login {
                display: block;
                margin: 10px auto 0 auto;
                background-color: #0004ff;
                color: #ffffff;
                padding: 10px 40px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                text-decoration: none;
                text-align: center;
            }

            .btn-login:hover {
                box-shadow: 0px 2px 5px rgb(0, 0, 0);
            }
    </style>
    </head>

    <body>
        <div class="login-container">
            <h2>Registrarse</h2>
<form>
<input type="text" id="username" placeholder="Usuario" required>
<input type="password" id="password" placeholder="Contraseña" required>
<input type="password" id="confirmPassword" placeholder="Confirmar Contraseña" required>
<button type="button" class="btn-register" onclick="registerUser()">Registrarse</button>
<a href="login.html" class="btn-login">¿Ya tienes una cuenta? Inicia sesión</a>
            </form>
        </div>
    </body>
</html>
